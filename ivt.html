<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanMetrics - Monitoreo de Ríos Atmosféricos (IVT)</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            max-width: 800px;
        }
        .header h1 {
            color: #1a365d;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .header p {
            color: #4a5568;
            margin: 0;
            font-size: 14px;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 100%;
            width: 850px;
            box-sizing: border-box;
            text-align: center;
        }
        .gif-container img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }
        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Monitoreo Dinámico de Ríos Atmosféricos (IVT)</h1>
        <p>Pronóstico numérico a 48 horas basado en el modelo GFS (Carrera Operativa) • Visualización de Flujo de Vapor de Agua Integrado</p>
    </div>

    <div class="card">
        <div class="gif-container">
            <img src="animacion_ivt.gif" alt="Pronóstico IVT GFS OceanMetrics">
        </div>
    </div>

    <div class="footer">
        &copy; 2026 OceanMetrics - Sistema de Alerta Temprana y Modelación Ambiental.
    </div>

</body>
</html>
