<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanMetrics - Cargando Dashboard...</title>
    <script>
        function redireccionarPorDispositivo() {
            var anchoPantalla = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
            var esMovil = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (anchoPantalla < 768 || esMovil) {
                window.location.href = "OceanMetrics_Dashboard_Mobile.html";
            } else {
                window.location.href = "OceanMetrics_Dashboard_Final.html";
            }
        }
        window.onload = redireccionarPorDispositivo;
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 40vh; font-family: sans-serif; color: #2c3e50;">
        <p style="font-size: 14px; font-weight: bold;">Detectando tipo de dispositivo...</p>
    </div>
</body>
</html>
