            if (lat < bounds[0][0] || lat > bounds[1][0] || lon < bounds[0][1] || lon > bounds[1][1]) {

            var c = Math.floor(lonFrac * (colCount - 1));
            r = Math.max(0, Math.min(r, rowCount - 1));
